
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Kun Khmer Fight 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      #root { width: 100vw; height: 100vh; }
      /* Custom scrollbar for commentary */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #1f2937; }
      ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

      /* Styles to make the VRButton fit into our grid layout */
      .vr-container button {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
        background: transparent !important;
        border: none !important;
        color: transparent !important;
        font-size: 0 !important;
        cursor: pointer !important;
        opacity: 0 !important; /* Fully transparent button to use our custom UI underneath */
        z-index: 10 !important;
      }
      /* Ensure no standard WebXR status text is visible */
      #XRButton, .XRButton, [id^="VRButton"], [class^="VRButton"] {
        color: transparent !important;
        text-shadow: none !important;
        background: transparent !important;
      }
    </style>
  <link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.png" type="image/png">
<link rel="apple-touch-icon" href="/icon.png">
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
